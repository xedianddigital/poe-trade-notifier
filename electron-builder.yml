appId: com.xediand.poetradenotifier
productName: PoE Trade Notifier
copyright: Copyright © 2026

directories:
  output: dist
  buildResources: build

# No asar: the Next server is forked as a child process, which is simplest and
# most reliable against real files on disk.
asar: false

files:
  - electron/**/*
  - package.json
  # Build-time only weight that the runtime server never touches. Excluded to
  # keep the installer down; each was verified unused at runtime.
  - '!node_modules/@img/**'          # sharp: images.unoptimized is set
  - '!node_modules/@next/swc-*/**'   # SWC compiles at build time, not runtime
  - '!node_modules/**/*.md'
  - '!node_modules/**/*.map'
  - '!node_modules/**/test/**'
  - '!node_modules/**/tests/**'
  - '!node_modules/**/docs/**'
  - from: .next/standalone
    to: server
    filter:
      - '**/*'
      # The default glob skips dot-directories, and the compiled server and its
      # static assets all live under .next.
      - '.next/**/*'
      # Never ship local session data. Running the server from the standalone
      # dir during testing can leave real cookies here; shipping them would
      # hand every downloader a live session.
      - '!.data'
      - '!.data/**'
      - '!**/.data/**'

# No native modules to rebuild against Electron's ABI anymore.
npmRebuild: false

win:
  target:
    - target: nsis
      arch: [x64]
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  # One-click: download, run, it installs and launches. No wizard, no admin
  # prompt, which is what a per-user install allows.
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  runAfterFinish: true
  deleteAppDataOnUninstall: false

linux:
  target:
    - AppImage
  category: Game
  artifactName: ${productName}-${version}.${ext}

mac:
  target: dmg
  category: public.app-category.games
