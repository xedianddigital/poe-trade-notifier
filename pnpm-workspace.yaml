# pnpm 11 no longer reads the "pnpm" field in package.json; these settings live here.

# electron-builder cannot package pnpm's symlinked store: it tries to recreate
# symlinks into node_modules/.pnpm, which is not copied into the app bundle. A
# hoisted (flat, npm-style) layout makes node_modules real directories, which
# both electron-builder and Next's output tracing handle correctly.
nodeLinker: hoisted

allowBuilds:
  # Next.js image optimisation.
  sharp: true
  # Only used when building the Windows installer, which happens on CI.
  electron-winstaller: true
  electron: true
